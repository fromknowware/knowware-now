<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf9;
    --paper: #ffffff;
    --ink: #0a0a0a;
    --sub: #6b6b6b;
    --sub2: #9a9a97;
    --rule: #e5e5e4;
    --rule-strong: #0a0a0a;
    --accent: oklch(0.55 0.15 250);
    --accent-soft: oklch(0.96 0.02 250);
    --theme-transition: background-color 0.7s cubic-bezier(0.19,1,0.22,1), color 0.7s cubic-bezier(0.19,1,0.22,1), border-color 0.7s cubic-bezier(0.19,1,0.22,1);

    /* Tweakable readability variables */
    --body-font: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --read-scale: 1.1;        /* multiplier on reading font sizes */
    --read-lh: 1.7;          /* line-height in reading article */
    --read-col: 880px;        /* max reading column width */
    --read-track: -0.015em;  /* letter-spacing for body */

    /* Three tiers — equal lightness & chroma, distinct hues */
    --tier-a:     oklch(0.88 0.09 260);  /* Academics — blue */
    --tier-p:     oklch(0.88 0.09 35);   /* Practitioners — terracotta */
    --tier-v:     oklch(0.88 0.09 140);  /* Visionaries — sage */
    --tier-a-ink: oklch(0.35 0.10 260);
    --tier-p-ink: oklch(0.40 0.12 35);
    --tier-v-ink: oklch(0.35 0.10 140);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: var(--body-font);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "kern", "liga";
    overflow-x: hidden;
    transition: var(--theme-transition);
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

  /* Dark theme */
  html[data-theme="dark"] {
    --bg: #111110;
    --paper: #1a1a18;
    --ink: #f0f0ea;
    --sub: #8a8a84;
    --sub2: #555550;
    --rule: #2a2a27;
    --accent: oklch(0.65 0.15 250);
    --accent-soft: oklch(0.22 0.06 250);
  }

  /* Warm theme */
  html[data-theme="warm"] {
    --bg: #e8e5de;
    --paper: #eeebe3;
    --ink: #1a1814;
    --sub: #6b6458;
    --sub2: #9a9488;
    --rule: #cbc7bd;
    --accent: oklch(0.50 0.15 250);
    --accent-soft: oklch(0.92 0.04 250);
  }

  /* High-contrast mode — applied when data-contrast="high" */
  html[data-contrast="high"] {
    --bg: #ffffff;
    --paper: #ffffff;
    --ink: #000000;
    --sub: #3a3a3a;
    --sub2: #5a5a5a;
    --rule: #b8b8b8;
  }

  /* Reading article overrides — applied inside <article data-kw-read> */
  article[data-kw-read] p,
  article[data-kw-read] blockquote p {
    font-size: calc(17px * var(--read-scale));
    line-height: var(--read-lh);
    letter-spacing: var(--read-track);
  }
  article[data-kw-read] blockquote p {
    font-size: calc(22px * var(--read-scale));
  }
  article[data-kw-read] {
    max-width: var(--read-col);
  }
</style>
</head>
<body>
<div id="root"></div>
