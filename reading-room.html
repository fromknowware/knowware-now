<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Systems of Intelligence — Reading Room</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #fafaf9;
    --paper: #ffffff;
    --ink: #0a0a0a;
    --sub: #6b6b6b;
    --sub2: #9a9a97;
    --rule: #e5e5e4;
    --accent: oklch(0.55 0.15 250);
    --accent-soft: oklch(0.96 0.02 250);
    --reading-scale: 1;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; overflow: hidden; }

  #mobile-toggle {
    display: none; position: fixed; bottom: 20px; left: 20px; z-index: 25;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
    font-size: 18px; font-family: "JetBrains Mono", monospace;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2); cursor: pointer; line-height: 1;
  }
  #mobile-toggle:hover { background: var(--accent); border-color: var(--accent); }
  .sidebar-overlay { display: none; }

  .sidebar {
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    background: #f3f3f2; border-right: 1px solid var(--rule);
    padding: 20px 0; font-family: "JetBrains Mono", monospace;
  }
  .sidebar h1 {
    margin: 0 20px 3px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .sidebar .sub {
    margin: 0 20px 16px;
    font-size: 9px; color: var(--sub2); letter-spacing: 0.04em; text-transform: uppercase;
  }
  .sidebar .group { margin-top: 16px; }
  .sidebar .group-title {
    padding: 3px 20px;
    font-size: 8px; color: var(--sub2); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
  }
  .sidebar button {
    display: block; width: 100%; text-align: left; padding: 7px 20px;
    border: none; background: transparent;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.02em; text-transform: uppercase;
    color: var(--ink); cursor: pointer; border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .sidebar button:hover { background: #ebebea; }
  .sidebar button.active {
    background: var(--ink); color: var(--paper);
    border-left-color: var(--accent); font-weight: 500;
  }
  .sidebar .fignum { color: var(--sub2); font-size: 8px; margin-left: 5px; }
  .sidebar button.active .fignum { color: #a0a0a0; }
  .sidebar .pagecount { color: var(--sub2); font-size: 8px; margin-left: 4px; }
  .sidebar button.active .pagecount { color: #a0a0a0; }
  /* Lock icon in sidebar */
  .sidebar .lockicon {
    display: inline-block; font-size: 8px; margin-left: 5px;
    color: var(--sub2); vertical-align: middle;
  }
  .sidebar button.active .lockicon { color: #a0a0a0; }
  .sidebar button.unlocked .lockicon { display: none; }

  .stage { overflow-y: scroll; overflow-x: hidden; background: var(--bg); height: 100vh; position: relative; }

  header {
    position: sticky; top: 0; z-index: 10; padding: 10px 24px;
    background: rgba(250,250,249,0.97);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    font-family: "JetBrains Mono", monospace;
  }
  header h2 {
    margin: 0; font-size: 10px; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--sub);
  }
  header button {
    font-family: "JetBrains Mono", monospace; font-size: 9px; padding: 4px 10px;
    border: 1px solid var(--rule); background: var(--paper);
    cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--sub); transition: all 0.15s;
  }
  header button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .font-ctrl {
    display: inline-flex; border: 1px solid var(--rule); overflow: hidden;
  }
  .font-ctrl button {
    border: none; padding: 4px 8px;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--sub); background: var(--paper);
    cursor: pointer; line-height: 1; letter-spacing: 0;
    border-right: 1px solid var(--rule);
  }
  .font-ctrl button:last-child { border-right: none; }
  .font-ctrl button.active { background: var(--ink); color: var(--paper); }
  .font-ctrl button:hover:not(.active) { background: var(--bg); }
  .font-ctrl .fs-s { font-size: 11px; }
  .font-ctrl .fs-m { font-size: 14px; }
  .font-ctrl .fs-l { font-size: 17px; }

  #count { margin-left: auto; font-size: 9px; color: var(--sub2); }

  main {
    max-width: 540px; margin: 0 auto; padding: 56px 40px 120px;
    background: var(--paper); min-height: 100vh;
    box-shadow: 0 0 40px rgba(0,0,0,0.04);
  }
  #content h1 {
    font-family: "Helvetica Neue", sans-serif;
    font-size: calc(26px * var(--reading-scale)); font-weight: 500;
    margin: 1.5em 0 0.4em; line-height: 1.1; letter-spacing: -0.025em;
  }
  #content h2 {
    font-family: "Helvetica Neue", sans-serif;
    font-size: calc(18px * var(--reading-scale)); font-weight: 500;
    margin: 2em 0 0.5em; line-height: 1.15; letter-spacing: -0.015em;
    border-bottom: 1px solid var(--rule); padding-bottom: 4px;
  }
  #content h3 {
    font-family: "Helvetica Neue", sans-serif;
    font-size: calc(15px * var(--reading-scale)); font-weight: 500;
    margin: 1.8em 0 0.4em; letter-spacing: -0.01em;
  }
  #content p {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: calc(15px * var(--reading-scale)); line-height: 1.7; margin: 0.8em 0;
  }
  #content blockquote {
    border-left: 2px solid var(--rule); padding: 4px 16px; margin: 1em 0;
    color: var(--sub); font-style: italic;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: calc(14px * var(--reading-scale));
  }
  #content ul, #content ol {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: calc(15px * var(--reading-scale)); line-height: 1.7;
  }
  #content code {
    font-family: "JetBrains Mono", monospace;
    background: var(--accent-soft); padding: 1px 4px;
    font-size: calc(11px * var(--reading-scale));
  }
  #content pre {
    background: var(--bg); padding: 12px; overflow: auto;
    font-size: calc(11px * var(--reading-scale)); border: 1px solid var(--rule);
  }
  #content strong { font-weight: 600; color: var(--ink); }
  #content hr { border: none; border-top: 1px solid var(--rule); margin: 2em 0; }
  #content em { font-style: italic; color: var(--sub); }
  #content img {
    max-width: 100%; width: 100%; height: auto; display: block; margin: 1.5em auto;
    border: 1px solid var(--rule); padding: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  #content p.caption {
    text-align: center; font-size: calc(10px * var(--reading-scale));
    color: var(--sub2); margin-top: -0.5em; margin-bottom: 2em; line-height: 1.4;
    font-family: "JetBrains Mono", monospace; letter-spacing: 0.03em; text-transform: uppercase;
  }
  #content p.caption em { font-style: normal; }
  #content table { border-collapse: collapse; margin: 1em 0; font-size: calc(13px * var(--reading-scale)); }
  #content th, #content td { border: 1px solid var(--rule); padding: 5px 8px; text-align: left; }
  #content th {
    background: var(--bg); font-family: "JetBrains Mono", monospace;
    text-transform: uppercase; font-size: 9px; letter-spacing: 0.05em; font-weight: 500;
  }
  .missing-img {
    display: inline-block; padding: 32px 20px; background: #fff0f0; color: #7a1a1a;
    border: 1px dashed #c9a0a0; font-family: "JetBrains Mono", monospace;
    font-size: 10px; text-align: center; margin: 1.5em auto;
  }
  #err { padding: 20px; background: #fff0f0; color: #7a1a1a; font-family: "JetBrains Mono", monospace; font-size: 11px; }
  .loading {
    text-align: center; color: var(--sub2); padding: 48px 20px;
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }

  /* ── Passcode gate ────────────────────────────────────────────── */
  .gate {
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 56px 40px 120px; max-width: 540px; margin: 0 auto;
    background: var(--paper); min-height: 100vh;
    box-shadow: 0 0 40px rgba(0,0,0,0.04);
  }
  .gate-kicker {
    font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--sub2);
    margin-bottom: 24px;
  }
  .gate-title {
    font-size: 28px; font-weight: 500; letter-spacing: -0.025em; line-height: 1.1;
    margin: 0 0 8px;
  }
  .gate-sub {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 15px; line-height: 1.6; color: var(--sub); margin: 0 0 32px;
  }
  .gate-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
  .gate-label {
    font-family: "JetBrains Mono", monospace; font-size: 9px;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--sub2);
  }
  .gate-input {
    font-family: "JetBrains Mono", monospace; font-size: 14px; letter-spacing: 0.06em;
    padding: 10px 14px; border: 1px solid var(--rule); background: var(--paper);
    color: var(--ink); width: 100%; outline: none; transition: border-color 0.15s;
  }
  .gate-input:focus { border-color: var(--accent); }
  .gate-input.error { border-color: oklch(0.5 0.2 25); }
  .gate-btn {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 10px 20px; border: 1px solid var(--ink); background: var(--ink);
    color: var(--paper); cursor: pointer; transition: all 0.15s; align-self: flex-start;
  }
  .gate-btn:hover { background: var(--accent); border-color: var(--accent); }
  .gate-error {
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    color: oklch(0.5 0.2 25); letter-spacing: 0.03em; display: none;
  }
  .gate-error.visible { display: block; }
  .gate-hint {
    margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--rule);
    font-family: "JetBrains Mono", monospace; font-size: 9px;
    color: var(--sub2); letter-spacing: 0.03em; line-height: 1.6;
  }
  .gate-hint a { color: var(--sub); text-decoration: underline; }

  /* ── Annotations ─────────────────────────────────────────────── */
  .ann-highlight {
    cursor: pointer; border-radius: 1px; padding: 0 1px;
    transition: background 0.15s; background: oklch(0.9 0.06 260);
  }
  .ann-highlight:hover { background: oklch(0.84 0.09 260); }
  .has-annotation { position: relative; }
  .ann-marker { position: absolute; right: -98px; width: 18px; height: 16px; cursor: pointer; user-select: none; }
  .ann-marker svg { display: block; width: 100%; height: 100%; }

  #ann-popup {
    position: fixed; z-index: 50;
    background: var(--ink); color: var(--paper);
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 5px 10px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); user-select: none;
  }
  #ann-popup:hover { background: var(--accent); }

  #ann-modal-overlay { display: none !important; pointer-events: none; }
  #ann-modal {
    position: fixed; z-index: 50; width: 300px;
    background: var(--paper); border: 1px solid var(--rule);
    box-shadow: -4px 2px 20px rgba(0,0,0,0.08);
    font-family: "JetBrains Mono", monospace; display: none; overflow: hidden;
  }
  .ann-modal-header {
    padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; gap: 8px;
  }
  .ann-modal-header .title { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
  .ann-modal-header .close { cursor: pointer; font-size: 16px; color: var(--sub); line-height: 1; }
  .ann-modal-header .close:hover { color: var(--ink); }
  .ann-modal-body { padding: 16px; }
  .ann-modal-body .quote {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-style: italic;
    font-size: 13px; color: var(--sub); border-left: 2px solid var(--rule);
    padding: 6px 10px; margin: 0 0 12px; max-height: 80px; overflow: hidden;
  }
  .ann-modal-body label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--sub2); margin: 8px 0 3px; }
  .ann-modal-body input, .ann-modal-body select, .ann-modal-body textarea {
    width: 100%; padding: 6px 8px; border: 1px solid var(--rule);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 13px;
    background: var(--paper); color: var(--ink); outline: none;
  }
  .ann-modal-body input:focus, .ann-modal-body textarea:focus { border-color: var(--accent); }
  .ann-modal-body textarea { height: 80px; resize: vertical; }
  .ann-modal-body select { font-family: "JetBrains Mono", monospace; font-size: 10px; }
  .ann-modal-footer { padding: 10px 16px; border-top: 1px solid var(--rule); display: flex; gap: 8px; justify-content: flex-end; }
  .ann-modal-footer button {
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 6px 14px; border: 1px solid var(--rule); cursor: pointer; transition: all 0.15s;
  }
  .ann-btn-save { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .ann-btn-save:hover { background: var(--accent); border-color: var(--accent); }
  .ann-btn-resolve { background: oklch(0.35 0.10 140); color: var(--paper); border-color: oklch(0.35 0.10 140); }
  .ann-btn-resolve:hover { background: oklch(0.45 0.12 140); }
  .ann-btn-cancel { background: var(--paper); color: var(--sub); }
  .ann-btn-cancel:hover { background: var(--bg); }
  .ann-btn-delete { background: oklch(0.35 0.15 25); color: var(--paper); border-color: oklch(0.35 0.15 25); }
  .ann-btn-delete:hover { background: oklch(0.45 0.15 25); }

  #ann-panel {
    position: absolute; top: 0; right: 0; bottom: 0; width: 320px;
    background: var(--paper); border-left: 1px solid var(--rule);
    box-shadow: -4px 0 20px rgba(0,0,0,0.06); z-index: 15;
    overflow-y: auto; display: none; font-family: "JetBrains Mono", monospace;
  }
  .ann-panel-header { padding: 12px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; }
  .ann-panel-header .title { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
  .ann-panel-header .close { cursor: pointer; font-size: 16px; color: var(--sub); }
  .ann-panel-item { padding: 10px 16px; border-bottom: 1px solid var(--rule); cursor: pointer; transition: background 0.1s; }
  .ann-panel-item:hover { background: var(--bg); }
  .ann-panel-item .ann-quote { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 12px; font-style: italic; color: var(--sub); margin-bottom: 4px; max-height: 40px; overflow: hidden; }
  .ann-panel-item .ann-meta { font-size: 8px; color: var(--sub2); text-transform: uppercase; letter-spacing: 0.04em; }
  .ann-panel-item .ann-comment { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 11px; color: var(--ink); margin-top: 4px; }
  .ann-panel-empty { padding: 20px; text-align: center; color: var(--sub2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }

  .ann-badge {
    font-family: "JetBrains Mono", monospace; font-size: 9px;
    padding: 4px 10px; border: 1px solid var(--rule); background: var(--paper);
    cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--sub); display: flex; align-items: center; gap: 4px; transition: all 0.15s;
  }
  .ann-badge:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .ann-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* Page breaks */
  .page-break { position: relative; margin: 32px -40px; height: 0; border: none; border-top: 1px dashed var(--rule); }
  .page-break .page-num {
    position: absolute; right: -58px; top: -11px;
    font-family: "JetBrains Mono", monospace; font-size: 13px; font-weight: 500;
    color: var(--sub2); letter-spacing: 0.04em; white-space: nowrap;
  }

  /* Page counter */
  .pg { display: flex; align-items: baseline; gap: 5px; margin-left: auto; font-family: "JetBrains Mono", monospace; }
  .pg .current { font-size: 28px; font-weight: 500; color: var(--ink); line-height: 1; letter-spacing: -0.02em; }
  .pg .sep { font-size: 14px; color: var(--rule); }
  .pg .section-total { font-size: 12px; color: var(--sub); font-weight: 500; }
  .pg .cumulative { font-size: 8px; color: var(--sub2); letter-spacing: 0.06em; text-transform: uppercase; margin-left: 6px; border-left: 1px solid var(--rule); padding-left: 6px; }

  /* ── Responsive: tablet ── */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 180px 1fr; }
    .sidebar button { font-size: 9px; padding: 6px 12px; }
    .sidebar h1 { font-size: 10px; margin: 0 12px 3px; }
    .sidebar .sub { margin: 0 12px 12px; font-size: 8px; }
    .sidebar .group-title { padding: 3px 12px; font-size: 7px; }
    header { gap: 6px; padding: 8px 12px; }
    header h2 { font-size: 9px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    header button { font-size: 8px; padding: 3px 6px; }
    .pg .current { font-size: 20px; }
    .pg .section-total { font-size: 10px; }
    .pg .cumulative { font-size: 7px; padding-left: 4px; margin-left: 4px; }
    main, .gate { padding: 32px 16px 80px; max-width: 100%; }
    #ann-modal { width: 260px; left: auto !important; right: 8px !important; }
    #ann-panel { width: 260px; }
    #count { display: none; }
  }
  /* ── Responsive: mobile ── */
  @media (max-width: 600px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed !important; top: 0; left: 0; bottom: 0; width: 280px; z-index: 20;
      transform: translateX(-100%); transition: transform 0.25s ease;
      border-right: 1px solid var(--rule); height: 100vh !important;
      box-shadow: 4px 0 20px rgba(0,0,0,0.12); overflow-y: auto;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 19; display: none; }
    .sidebar-overlay.open { display: block; }
    #mobile-toggle { display: block; }
    main, .gate { padding: 24px 12px 80px; max-width: 100%; }
    #ann-modal { width: calc(100vw - 32px); left: 16px !important; right: 16px !important; }
  }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <button id="mobile-toggle">☰</button>
  <nav class="sidebar" id="sidebar-nav">
    <h1>Systems of Intelligence</h1>
    <div class="sub">Reading room · 65 figures · 17 sections</div>
    <div id="nav"></div>
  </nav>
  <div class="stage">
    <header>
      <h2 id="section-label">—</h2>
      <button id="reload">↻ Reload</button>
      <button id="raw" title="View source markdown">Raw</button>
      <button id="proof" title="Open in Proof (Ch01)" style="display:none">On Proof ↗</button>
      <div class="font-ctrl" title="Font size (keyboard: − / 0 / +)">
        <button class="fs-s" data-scale="0.875" aria-label="Small">A</button>
        <button class="fs-m" data-scale="1" aria-label="Medium">A</button>
        <button class="fs-l" data-scale="1.2" aria-label="Large">A</button>
      </div>
      <span id="count"></span>
      <button class="ann-badge" id="ann-toggle"><span class="dot"></span> <span id="ann-count">0</span> Notes</button>
      <div class="pg">
        <span class="current" id="pg-current">—</span>
        <span class="sep">/</span>
        <span class="section-total" id="pg-total">—</span>
        <span class="cumulative" id="pg-cumulative">—</span>
      </div>
    </header>

    <main id="content"><div class="loading">Select a section from the sidebar →</div></main>

    <div id="ann-popup" style="display:none">Comment</div>
    <div id="ann-modal" style="display:none">
      <div class="ann-modal-header">
        <span class="title" id="ann-modal-title">Add Note</span>
        <span class="close" id="ann-modal-close">×</span>
      </div>
      <div class="ann-modal-body">
        <div class="quote" id="ann-modal-quote"></div>
        <div id="ann-modal-create">
          <label>Your name</label>
          <input type="text" id="ann-name" placeholder="Reviewer name" />
          <label>Note</label>
          <textarea id="ann-comment" placeholder="Your note…"></textarea>
        </div>
        <div id="ann-modal-view" style="display:none">
          <label>Author</label>
          <div id="ann-view-author" style="font-size:11px;color:var(--sub);margin-top:3px"></div>
          <label>Note</label>
          <div id="ann-view-comment" style="font-size:14px;color:var(--ink);margin-top:4px"></div>
        </div>
      </div>
      <div class="ann-modal-footer" id="ann-modal-footer-create">
        <button class="ann-btn-cancel" id="ann-cancel">Cancel</button>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── Configuration ───────────────────────────────────────────────────
// Content is served from the systems-intelligence GitHub Pages repo.
const BASE = "https://fromknowware.github.io/systems-intelligence/";

// Passcodes per section index (null = open, string = locked).
// Replace placeholder values with your real passcodes before distributing.
// Front matter (0–2) is open so contributors see context immediately.
const SECTION_PASSCODES = [
  null,          // 0  Preface          — open
  null,          // 1  Acknowledgments  — open
  null,          // 2  Prologue         — open
  "ch01-2026",   // 3  Ch01
  "ch02-2026",   // 4  Ch02
  "ch03-2026",   // 5  Ch03
  "ch04-2026",   // 6  Ch04
  "ch05-2026",   // 7  Ch05
  "ch06-2026",   // 8  Ch06
  "ch07-2026",   // 9  Ch07
  "ch08-2026",   // 10 Ch08
  "ch09-2026",   // 11 Ch09
  "chX-2026",    // 12 ChX
  "back-2026",   // 13 Appendix A
  "back-2026",   // 14 Appendix B
  "back-2026",   // 15 Appendix C
  "back-2026",   // 16 About the Author
];

const UNLOCK_KEY = "soi-unlocked-sections"; // localStorage key

function getUnlocked() {
  try { return new Set(JSON.parse(localStorage.getItem(UNLOCK_KEY) || "[]")); }
  catch(e) { return new Set(); }
}
function setUnlocked(set) {
  localStorage.setItem(UNLOCK_KEY, JSON.stringify([...set]));
}
function isUnlocked(idx) {
  return SECTION_PASSCODES[idx] === null || getUnlocked().has(idx);
}
function unlock(idx) {
  const s = getUnlocked();
  s.add(idx);
  setUnlocked(s);
}

const SECTIONS = [
  {label:"Preface",                            group:"Front matter", figs:1, path:BASE+"chapters/front-matter/preface/text/preface-with-figures.md"},
  {label:"Acknowledgments",                    group:"Front matter", figs:0, path:BASE+"chapters/front-matter/acknowledgments/text/acknowledgments-with-figures.md"},
  {label:"Prologue",                           group:"Front matter", figs:2, path:BASE+"chapters/front-matter/prologue/text/prologue-with-figures.md"},
  {label:"Ch01 · Coordination Revolution",     group:"Chapters",     figs:8, path:BASE+"chapters/ch01/text/chapter-01-with-figures.md", proof:"https://www.proofeditor.ai/d/ac13qw8o?token=13ad4f6a-31fa-423f-b677-fb72aeb3fbb0"},
  {label:"Ch02 · Dawn of Systems Intelligence",group:"Chapters",     figs:5, path:BASE+"chapters/ch02/text/chapter-02-with-figures.md"},

// ── Sidebar ─────────────────────────────────────────────────────────
const navEl = document.getElementById("nav");
const contentEl = document.getElementById("content");
const countEl = document.getElementById("count");
const sectionLabel = document.getElementById("section-label");
const proofBtn = document.getElementById("proof");

(function buildNav() {
  const groups = {};
  SECTIONS.forEach((s, i) => { (groups[s.group] = groups[s.group] || []).push({...s, idx: i}); });
  const order = ["Front matter", "Chapters", "Back matter"];
  navEl.innerHTML = "";
  order.forEach(g => {
    if (!groups[g]) return;
    const gd = document.createElement("div");
    gd.className = "group";

      b.addEventListener("click", () => load(s.idx));
      gd.appendChild(b);

})();

function refreshNav() {
  document.querySelectorAll("nav.sidebar button").forEach(b => {
    const idx = +b.dataset.idx;
    const li = b.querySelector(".lockicon");
    if (isUnlocked(idx)) {
      b.classList.add("unlocked");
      if (li) li.textContent = "";
    } else {
      b.classList.remove("unlocked");
      if (li) li.textContent = "⋯";
    }

}

// ── Image rewriting (handles absolute BASE URLs) ─────────────────────
function rewriteImages(html, baseUrl) {
  return html.replace(/<img\s+([^>]*?)src="([^"]+)"/g, (m, attrs, src) => {
    if (src.startsWith("http") || src.startsWith("//") || src.startsWith("/")) return m;
    try {
      const resolved = new URL(src, baseUrl).href;
      return `<img ${attrs}src="${resolved}" onerror="this.outerHTML='<div class=\\"missing-img\\">Image not found: ${src.replace(/"/g,"")}</div>'"`;
    } catch(e) { return m; }
  });
}

// ── Page break system ────────────────────────────────────────────────
const pgCurrent = document.getElementById("pg-current");
const pgTotal = document.getElementById("pg-total");
const pgCumulative = document.getElementById("pg-cumulative");

const COL_WIDTH = 540;
const PAGE_TEXT  = Math.round(COL_WIDTH * (9 / 6));   // 810px
const PAGE_IMAGE = Math.round(COL_WIDTH * (11 / 6));  // 990px
const sectionPages = {};

function getCumulativeStart(idx) {
  let sum = 0;
  for (let i = 0; i < idx; i++) sum += (sectionPages[i] || 0);
  return sum;
}

function insertPageBreaks(container) {
  container.querySelectorAll(".page-break").forEach(el => el.remove());
  let accHeight = 0, pageNum = 1, pageHasImage = false;
  Array.from(container.children).forEach(child => {
    const h = child.getBoundingClientRect().height;
    const hasImg = child.tagName === "IMG" || child.querySelector("img") || child.classList.contains("missing-img");
    if (hasImg) pageHasImage = true;
    const threshold = pageHasImage ? PAGE_IMAGE : PAGE_TEXT;
    accHeight += h;
    if (accHeight >= threshold) {
      const pb = document.createElement("div");
      pb.className = "page-break";
      pb.innerHTML = `<span class="page-num">${pageNum}</span>`;
      child.parentNode.insertBefore(pb, child);
      pageNum++;
      accHeight = h;
      pageHasImage = hasImg;
    }
  });
}

function setupPageScroll(totalPages, sectionIdx) {
  sectionPages[sectionIdx] = totalPages;
  const cumStart = getCumulativeStart(sectionIdx);
  const stage = document.querySelector(".stage");
  pgCurrent.textContent = "1";
  pgTotal.textContent = totalPages;
  pgCumulative.textContent = `p${cumStart + 1} of book`;
  const triggerZone = stage.clientHeight * 0.15;
  const updatePageNum = () => {
    const breaks = contentEl.querySelectorAll(".page-break");
    const stageTop = stage.getBoundingClientRect().top;
    let current = 1;
    breaks.forEach(pb => { if (pb.getBoundingClientRect().top - stageTop < triggerZone) current++; });
    pgCurrent.textContent = current;
    pgCumulative.textContent = `p${cumStart + current} of book`;
  };
  stage.removeEventListener("scroll", stage._pageScrollFn);
  stage._pageScrollFn = updatePageNum;
  stage.addEventListener("scroll", updatePageNum, {passive: true});
}

// ── Passcode gate UI ─────────────────────────────────────────────────
function showGate(idx) {
  const sec = SECTIONS[idx];
  const stage = document.querySelector(".stage");
  annPanel.style.display = "none";
  pgCurrent.textContent = "—";
  pgTotal.textContent = "—";
  pgCumulative.textContent = "—";
  countEl.textContent = "";

  // Render gate in place of main content
  const gateEl = document.createElement("div");
  gateEl.className = "gate";
  gateEl.innerHTML = `
    <div class="gate-kicker">Systems of Intelligence · ${sec.group}</div>
    <div class="gate-title">${sec.label}</div>
    <p class="gate-sub">This section is accessible with a passcode sent to manuscript editors after their claim is confirmed.</p>
    <div class="gate-form">
      <label class="gate-label">Passcode</label>
      <input class="gate-input" type="text" id="gate-input" placeholder="enter passcode" autocomplete="off" spellcheck="false" />
      <div class="gate-error" id="gate-error">Incorrect passcode — check your letter.</div>
      <button class="gate-btn" id="gate-btn">Unlock this section →</button>
    </div>
    <div class="gate-hint">
      No passcode yet? Your letter arrives within fourteen days of submitting your claim.<br>
      Questions? <a href="mailto:theusual@gmail.com">Write to us.</a>
    </div>`;

  // Replace main content area
  contentEl.replaceWith(gateEl);

  const input = document.getElementById("gate-input");
  const btn = document.getElementById("gate-btn");
  const errEl = document.getElementById("gate-error");

  function tryUnlock() {
    const val = input.value.trim();
    if (val === SECTION_PASSCODES[idx]) {
      unlock(idx);
      refreshNav();
      // Restore main element and load content
      const newMain = document.createElement("main");
      newMain.id = "content";
      gateEl.replaceWith(newMain);
      // contentEl reference is stale after replaceWith; re-point it
      Object.defineProperty(window, "_content", {value: newMain, writable: true, configurable: true});
      actualLoad(idx, newMain);
    } else {
      input.classList.add("error");
      errEl.classList.add("visible");
      input.focus();
    }
  }

  btn.addEventListener("click", tryUnlock);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") tryUnlock();
    input.classList.remove("error");
    errEl.classList.remove("visible");
  });
  input.focus();
  stage.scrollTo(0, 0);
}

// ── Section loader ───────────────────────────────────────────────────
let currentIdx = 0;

async function load(i) {
  currentIdx = i;
  const sec = SECTIONS[i];
  sectionLabel.textContent = sec.label;
  closeMobileSidebar();

  document.querySelectorAll("nav.sidebar button").forEach(b => {
    b.classList.toggle("active", +b.dataset.idx === i);
  });
  proofBtn.style.display = sec.proof ? "inline-block" : "none";

  // Restore main element if gate replaced it
  let mainEl = document.getElementById("content");
  if (!mainEl) {
    mainEl = document.createElement("main");
    mainEl.id = "content";
    const gateEl = document.querySelector(".gate");
    if (gateEl) gateEl.replaceWith(mainEl);
  }

  if (!isUnlocked(i)) {
    mainEl.innerHTML = "";
    showGate(i);
    return;
  }

  mainEl.innerHTML = "<div class='loading'>Loading…</div>";
  await actualLoad(i, mainEl);
}

async function actualLoad(i, container) {
  const sec = SECTIONS[i];
  try {
    const res = await fetch(sec.path + "?t=" + Date.now());
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const md = await res.text();
    const basePath = sec.path.substring(0, sec.path.lastIndexOf("/") + 1);
    const html = marked.parse(md);
    container.innerHTML = rewriteImages(html, basePath);

    container.querySelectorAll("p").forEach(p => {
      const text = p.textContent.trim();
      if (text.startsWith("Figure ") && p.children.length <= 2 && p.querySelector("em")) {
        p.classList.add("caption");
      }
    });

    insertPageBreaks(container);

    const figs = (md.match(/^!\[Figure/gm) || []).length;
    const words = md.split(/\s+/).filter(Boolean).length;
    const totalPages = container.querySelectorAll(".page-break").length + 1;
    countEl.textContent = `${figs} figs · ${words.toLocaleString()} words · ~${totalPages} pages`;

    applyHighlights(container, i);
    setupPageScroll(totalPages, i);
    annPanel.style.display = "none";
    document.querySelector(".stage").scrollTo(0, 0);
    localStorage.setItem("soi-preview-section", i);
  } catch(e) {
    container.innerHTML = `<div id='err'>Failed to load ${sec.path}: ${e.message}</div>`;
  }
}

// ── Font size control ────────────────────────────────────────────────
const FONT_KEY = "soi-reading-scale";
const SCALES = [0.875, 1, 1.2];
function applyScale(scale) {
  document.documentElement.style.setProperty("--reading-scale", scale);
  localStorage.setItem(FONT_KEY, String(scale));
  document.querySelectorAll(".font-ctrl button").forEach(b => {
    b.classList.toggle("active", Math.abs(parseFloat(b.dataset.scale) - scale) < 0.001);
  });
}
function currentScale() {
  const saved = parseFloat(localStorage.getItem(FONT_KEY));
  return SCALES.includes(saved) ? saved : 1;
}
document.querySelectorAll(".font-ctrl button").forEach(b => {
  b.addEventListener("click", () => applyScale(parseFloat(b.dataset.scale)));
});
applyScale(currentScale());
document.addEventListener("keydown", e => {
  if (e.target.matches("input, textarea")) return;
  if (e.key === "-" || e.key === "_") { e.preventDefault(); applyScale(0.875); }
  else if (e.key === "0") { e.preventDefault(); applyScale(1); }
  else if (e.key === "+" || e.key === "=") { e.preventDefault(); applyScale(1.2); }
});

document.getElementById("reload").addEventListener("click", () => load(currentIdx));
document.getElementById("raw").addEventListener("click", () => {
  window.open(SECTIONS[currentIdx].path, "_blank");
});
proofBtn.addEventListener("click", () => {
  const sec = SECTIONS[currentIdx];
  if (sec.proof) window.open(sec.proof, "_blank");
});

// ── Cumulative page count seeding ────────────────────────────────────
(async function seedPageCounts() {
  for (let i = 0; i < SECTIONS.length; i++) {
    if (sectionPages[i]) continue;
    try {
      const res = await fetch(SECTIONS[i].path + "?t=seed");
      if (!res.ok) continue;
      const md = await res.text();
      const words = md.split(/\s+/).filter(Boolean).length;
      sectionPages[i] = Math.max(1, Math.round(words / 150));
    } catch(e) { sectionPages[i] = 0; }
  }
  document.querySelectorAll("nav.sidebar button").forEach(b => {
    const idx = +b.dataset.idx;
    const pages = sectionPages[idx];
    if (pages) {
      let sp = b.querySelector(".pagecount");
      if (!sp) { sp = document.createElement("span"); sp.className = "pagecount"; b.appendChild(sp); }
      sp.textContent = `~${pages}p`;
    }
  });
})();

// ── Annotation system ─────────────────────────────────────────────────
const GITHUB_REPO = "fromknowware/systems-intelligence";
const PAGES_BASE  = `https://fromknowware.github.io/systems-intelligence`;
const ANN_KEY     = "soi-annotations";
const annPopup    = document.getElementById("ann-popup");
const annModal    = document.getElementById("ann-modal");
const annPanel    = document.getElementById("ann-panel");
const annPanelList = document.getElementById("ann-panel-list");
const annCount    = document.getElementById("ann-count");
let currentAnnotations = [];
let pendingQuote = "";
let viewingAnnId = null;

function getAllAnnotations() {
  try { return JSON.parse(localStorage.getItem(ANN_KEY) || "{}"); } catch(e) { return {}; }
}
function getAnnotations(path) {
  return (getAllAnnotations()[path] || []).filter(a => !a.resolved);
}
function addAnnotation(path, ann) {
  const all = getAllAnnotations();
  (all[path] = all[path] || []).push(ann);
  localStorage.setItem(ANN_KEY, JSON.stringify(all));
  dispatchToGitHub({action: "add", sectionPath: path, annotation: ann});
}
function resolveAnnotation(path, annId) {
  const all = getAllAnnotations();
  (all[path] || []).forEach(a => { if (a.id === annId) a.resolved = true; });
  localStorage.setItem(ANN_KEY, JSON.stringify(all));
  dispatchToGitHub({action: "resolve", sectionPath: path, annId: annId});
}
function deleteAnnotation(path, annId) {
  const all = getAllAnnotations();
  all[path] = (all[path] || []).filter(a => a.id !== annId);
  localStorage.setItem(ANN_KEY, JSON.stringify(all));
}

async function fetchRemoteAnnotations() {
  try {
    const res = await fetch(`${PAGES_BASE}/_meta/annotations.json?t=${Date.now()}`);
    if (!res.ok) return;
    const remote = await res.json();
    const local = getAllAnnotations();
    let merged = false;
    for (const [path, anns] of Object.entries(remote)) {
      const localAnns = local[path] || [];
      const localIds = new Set(localAnns.map(a => a.id));
      for (const a of anns) {
        if (!localIds.has(a.id)) { localAnns.push(a); merged = true; }
      }
      local[path] = localAnns;
    }
    if (merged) localStorage.setItem(ANN_KEY, JSON.stringify(local));
  } catch(e) { /* silent — file may not exist yet */ }
}

function dispatchToGitHub(payload) {
  const pat = localStorage.getItem("soi-github-pat");
  if (!pat) return;
  fetch(`https://api.github.com/repos/${GITHUB_REPO}/dispatches`, {
    method: "POST",
    headers: {"Authorization": `token ${pat}`, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json"},
    body: JSON.stringify({event_type: "annotation", client_payload: payload})
  }).catch(() => {});
}

function applyHighlights(container, idx) {
  if (!container) container = document.getElementById("content");
  if (!container) return;
  container.querySelectorAll(".ann-highlight").forEach(el => el.replaceWith(...el.childNodes));
  const path = SECTIONS[idx !== undefined ? idx : currentIdx].path;
  currentAnnotations = getAnnotations(path);
  annCount.textContent = currentAnnotations.length;
  if (!currentAnnotations.length) return;

  currentAnnotations.forEach(ann => {
    if (!ann.quote) return;
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);

    let concat = "", map = [];
    for (const n of nodes) {
      map.push({node: n, start: concat.length, len: n.textContent.length});
      concat += n.textContent;
    }

    const matchIdx = concat.indexOf(ann.quote);
    if (matchIdx === -1) return;
    const matchEnd = matchIdx + ann.quote.length;
    let firstSpan = null;

    for (const entry of map) {
      if (entry.start + entry.len <= matchIdx || entry.start >= matchEnd) continue;
      const offStart = Math.max(0, matchIdx - entry.start);
      const offEnd   = Math.min(entry.len, matchEnd - entry.start);
      const range = document.createRange();
      range.setStart(entry.node, offStart);
      range.setEnd(entry.node, offEnd);
      const span = document.createElement("span");
      span.className = "ann-highlight";
      span.dataset.annId = ann.id;
      range.surroundContents(span);
      if (!firstSpan) firstSpan = span;
    }

    if (!firstSpan) return;
    const parentBlock = firstSpan.closest("p, li, h1, h2, h3, blockquote, div");
    if (parentBlock) parentBlock.classList.add("has-annotation");
    const marker = document.createElement("span");
    marker.className = "ann-marker";
    marker.innerHTML = `<svg viewBox="0 0 18 16"><path d="M9 1L1 15h16L9 1z" fill="oklch(0.55 0.15 250)" stroke="#0a0a0a" stroke-width="1"/><text x="9" y="13" text-anchor="middle" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace" fill="#fff">!</text></svg>`;
    marker.dataset.annId = ann.id;
    if (parentBlock) {
      parentBlock.appendChild(marker);
      marker.style.top = firstSpan.offsetTop + "px";
    } else firstSpan.appendChild(marker);
  });
}

// ── Text selection popup ─────────────────────────────────────────────
let lastMouseUpX = 0, lastMouseUpY = 0;
document.addEventListener("mouseup", e => {
  lastMouseUpX = e.clientX; lastMouseUpY = e.clientY;
  setTimeout(showPopupIfSelection, 20);
});
function showPopupIfSelection() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) { annPopup.style.display = "none"; return; }
  const selText = sel.toString().trim();
  if (!selText) { annPopup.style.display = "none"; return; }

  const wordCount = selText.split(/\s+/).length;
  if (wordCount > 500) {
    annPopup.textContent = `⚠ ${wordCount} words — max 500`;
    annPopup.style.background = "oklch(0.35 0.15 25)";
    annPopup.style.display = "block";
    annPopup.style.left = (lastMouseUpX - 60) + "px";
    annPopup.style.top = (lastMouseUpY - 36) + "px";
    pendingQuote = "";
    setTimeout(() => { annPopup.style.display = "none"; annPopup.textContent = "Comment"; annPopup.style.background = ""; }, 2500);
    return;
  }
  annPopup.textContent = wordCount > 100 ? `Comment (${wordCount}w)` : "Comment";
  annPopup.style.background = "";
  annPopup.style.display = "block";
  annPopup.style.left = (lastMouseUpX - 40) + "px";
  annPopup.style.top = (lastMouseUpY - 36) + "px";
  pendingQuote = selText;
}
document.addEventListener("mousedown", e => {
  if (e.target !== annPopup && !annPopup.contains(e.target)) annPopup.style.display = "none";
});

// ── Modal positioning ────────────────────────────────────────────────
function positionModal(anchorEl) {
  const mainEl = document.querySelector("main");
  if (!mainEl) return;
  const mainRect = mainEl.getBoundingClientRect();
  const leftPos = Math.min(mainRect.right + 16, window.innerWidth - 320);
  let topPos = anchorEl && anchorEl.getBoundingClientRect ? anchorEl.getBoundingClientRect().top : lastMouseUpY;
  topPos = Math.max(60, Math.min(topPos, window.innerHeight - 400));
  annModal.style.left = leftPos + "px";
  annModal.style.top = topPos + "px";
}

annPopup.addEventListener("click", () => {
  annPopup.style.display = "none";
  window.getSelection().removeAllRanges();
  const q = pendingQuote;
  document.getElementById("ann-modal-quote").textContent = q.length > 120 ? q.substring(0, 117) + "…" : q;
  document.getElementById("ann-modal-title").textContent = "Add Note";
  document.getElementById("ann-modal-create").style.display = "block";
  document.getElementById("ann-modal-view").style.display = "none";
  document.getElementById("ann-modal-footer-create").style.display = "flex";
  document.getElementById("ann-modal-footer-view").style.display = "none";
  document.getElementById("ann-name").value = localStorage.getItem("soi-reviewer-name") || "";
  document.getElementById("ann-comment").value = "";
  annModal.style.display = "block";
  positionModal(null);
  viewingAnnId = null;
});

// Click on highlight or marker → view mode
document.querySelector(".stage").addEventListener("click", e => {
  const marker = e.target.closest(".ann-marker");
  let hl = e.target.closest(".ann-highlight");
  if (marker) {
    const id = marker.dataset.annId;
    const mainEl = document.getElementById("content");
    if (mainEl) hl = mainEl.querySelector(`.ann-highlight[data-ann-id="${id}"]`);
  }
  if (!hl) return;
  const ann = currentAnnotations.find(a => a.id === hl.dataset.annId);
  if (!ann) return;
  viewingAnnId = ann.id;
  document.getElementById("ann-modal-quote").textContent = ann.quote.length > 120 ? ann.quote.substring(0, 117) + "…" : ann.quote;
  document.getElementById("ann-modal-title").textContent = "Note";
  document.getElementById("ann-modal-create").style.display = "none";
  document.getElementById("ann-modal-view").style.display = "block";
  document.getElementById("ann-modal-footer-create").style.display = "none";
  document.getElementById("ann-modal-footer-view").style.display = "flex";
  document.getElementById("ann-view-author").textContent = ann.author || "Anonymous";
  document.getElementById("ann-view-comment").textContent = ann.comment || "";
  annModal.style.display = "block";
  positionModal(hl.getBoundingClientRect ? hl : null);
});

function closeModal() { annModal.style.display = "none"; viewingAnnId = null; }
document.getElementById("ann-modal-close").addEventListener("click", closeModal);
document.getElementById("ann-cancel").addEventListener("click", closeModal);
document.addEventListener("mousedown", e => {
  if (annModal.style.display === "block" && !annModal.contains(e.target) &&
      !e.target.closest(".ann-highlight") && !e.target.closest(".ann-marker") && e.target !== annPopup) {
    closeModal();
  }
});

document.getElementById("ann-save").addEventListener("click", () => {
  const name = document.getElementById("ann-name").value.trim() || "Anonymous";
  localStorage.setItem("soi-reviewer-name", name);
  const ann = {
    id: "ann-" + Date.now() + "-" + Math.random().toString(36).substring(2, 6),
    quote: pendingQuote, type: "note", author: name,
    comment: document.getElementById("ann-comment").value.trim(),
    createdAt: new Date().toISOString(), resolved: false
  };
  addAnnotation(SECTIONS[currentIdx].path, ann);
  closeModal();
  applyHighlights(document.getElementById("content"), currentIdx);
});

document.getElementById("ann-resolve").addEventListener("click", () => {
  if (!viewingAnnId) return;
  resolveAnnotation(SECTIONS[currentIdx].path, viewingAnnId);
  closeModal();
  applyHighlights(document.getElementById("content"), currentIdx);
});

document.getElementById("ann-delete").addEventListener("click", () => {
  if (!viewingAnnId) return;
  deleteAnnotation(SECTIONS[currentIdx].path, viewingAnnId);
  closeModal();
  applyHighlights(document.getElementById("content"), currentIdx);
});

// ── Notes panel ───────────────────────────────────────────────────────
document.getElementById("ann-toggle").addEventListener("click", () => {
  const open = annPanel.style.display === "none";
  annPanel.style.display = open ? "block" : "none";
  if (open) renderPanel();
});
document.getElementById("ann-panel-close").addEventListener("click", () => {
  annPanel.style.display = "none";
});
function renderPanel() {
  const path = SECTIONS[currentIdx].path;
  const anns = getAnnotations(path);
  if (!anns.length) {
    annPanelList.innerHTML = '<div class="ann-panel-empty">No notes yet.<br>Select text to add one.</div>';
    return;
  }
  annPanelList.innerHTML = anns.map(a => `
    <div class="ann-panel-item" data-ann-id="${a.id}">
      <div class="ann-quote">"${(a.quote || "").substring(0, 80)}${(a.quote || "").length > 80 ? "…" : ""}"</div>
      <div class="ann-meta">${a.author || "Anon"} · ${new Date(a.createdAt).toLocaleDateString()}</div>
      <div class="ann-comment">${a.comment || ""}</div>
    </div>`).join("");
  annPanelList.querySelectorAll(".ann-panel-item").forEach(el => {
    el.addEventListener("click", () => {
      const mainEl = document.getElementById("content");
      if (!mainEl) return;
      const hl = mainEl.querySelector(`[data-ann-id="${el.dataset.annId}"]`);
      if (hl) hl.scrollIntoView({behavior: "smooth", block: "center"});
    });
  });
}

// ── Mobile sidebar ───────────────────────────────────────────────────
const mobileToggle = document.getElementById("mobile-toggle");
const sidebarNav = document.getElementById("sidebar-nav");
const sidebarOverlay = document.getElementById("sidebar-overlay");
mobileToggle.addEventListener("click", () => {
  sidebarNav.classList.toggle("open");
  sidebarOverlay.classList.toggle("open");
  mobileToggle.textContent = sidebarNav.classList.contains("open") ? "×" : "☰";
});
sidebarOverlay.addEventListener("click", () => {
  sidebarNav.classList.remove("open");
  sidebarOverlay.classList.remove("open");
  mobileToggle.textContent = "☰";
});
function closeMobileSidebar() {
  if (window.innerWidth <= 600) {
    sidebarNav.classList.remove("open");
    sidebarOverlay.classList.remove("open");
    mobileToggle.textContent = "☰";
  }
}

// ── Init ──────────────────────────────────────────────────────────────
fetchRemoteAnnotations();
const saved = parseInt(localStorage.getItem("soi-preview-section") || "0", 10);
const start = isNaN(saved) || saved < 0 || saved >= SECTIONS.length ? 0 : saved;
load(start);
</script>
</body>
</html>
